<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — PitchLive</title>
  <meta name="description" content="Reset your PitchLive account password.">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>
  </div>

  <div class="auth-page">
    <div class="auth-container">
      <a href="login.html" class="back-home">← Back to Sign In</a>

      <div class="auth-card">
        <a href="../index.html" class="auth-logo">
          <div class="auth-logo-icon">⚽</div>
          <div class="auth-logo-text">Score<span>X</span></div>
        </a>

        <!-- Default State: Enter Email -->
        <div id="form-state">
          <div class="auth-header">
            <h1 class="auth-title">Forgot your password?</h1>
            <p class="auth-subtitle">No worries. Enter your email and we'll send you a reset link.</p>
          </div>

          <div id="forgot-alert"></div>

          <form class="auth-form" id="forgot-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="email">Email Address</label>
              <input
                type="email"
                id="email"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              >
              <span class="form-error" id="email-error"></span>
            </div>

            <button type="submit" class="btn-primary" id="forgot-btn">
              Send Reset Link
            </button>
          </form>
        </div>

        <!-- Success State: Email Sent -->
        <div id="success-state" style="display:none;">
          <div class="success-state">
            <div class="success-icon">📧</div>
            <h2 style="font-family:'Poppins',sans-serif;font-size:20px;margin-bottom:8px;">Check your inbox</h2>
            <p style="color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:20px;">
              We've sent a password reset link to <strong id="sent-email" style="color:var(--text)"></strong>.
              The link expires in 1 hour.
            </p>
            <div id="forgot-alert-success"></div>
            <div class="resend-countdown" id="resend-area">
              Didn't receive it? <a id="resend-btn" href="#">Resend email</a>
              <span id="resend-timer" style="display:none">in <strong id="countdown">60</strong>s</span>
            </div>
          </div>
        </div>

        <div class="auth-footer">
          Remember your password? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    let lastEmail = '';
    let countdownInterval;

    const startResendCountdown = () => {
      const resendBtn = document.getElementById('resend-btn');
      const resendTimer = document.getElementById('resend-timer');
      const countdownEl = document.getElementById('countdown');

      resendBtn.style.display = 'none';
      resendTimer.style.display = 'inline';
      let seconds = 60;
      countdownEl.textContent = seconds;

      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(countdownInterval);
          resendTimer.style.display = 'none';
          resendBtn.style.display = 'inline';
        }
      }, 1000);
    };

    const sendReset = async (email) => {
      const { ok, data } = await AuthManager.forgotPassword(email);
      return ok;
    };

    const showSuccessState = (email) => {
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
      document.getElementById('sent-email').textContent = email;
      startResendCountdown();
    };

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearFormErrors('forgot-form');

      const email = document.getElementById('email').value.trim();
      if (!email) return showFieldError('email', 'Please enter your email address');

      const btn = document.getElementById('forgot-btn');
      btn.classList.add('loading');
      btn.disabled = true;

      lastEmail = email;
      await sendReset(email);

      btn.classList.remove('loading');
      btn.disabled = false;

      showSuccessState(email);
    });

    document.getElementById('resend-btn').addEventListener('click', async (e) => {
      e.preventDefault();
      await sendReset(lastEmail);
      showAlert('forgot-alert-success', 'Email resent!', 'success');
      startResendCountdown();
    });
  </script>
</body>
</html>
