<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PitchLive Sports Analytics</title>
  <meta name="description" content="Sign in to your PitchLive account to access live scores, predictions, and personalized sports analytics.">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>
  </div>

  <div class="auth-page">
    <div class="auth-container">

      <!-- Back to Home -->
      <a href="../index.html" class="back-home">
        ← Back to PitchLive
      </a>

      <div class="auth-card">
        <!-- Logo -->
        <a href="../index.html" class="auth-logo">
          <div class="auth-logo-icon">⚽</div>
          <div class="auth-logo-text">Score<span>X</span></div>
        </a>

        <!-- Header -->
        <div class="auth-header">
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Sign in to access live scores, predictions, and your personalized feed.</p>
        </div>

        <!-- Alert Container -->
        <div id="login-alert"></div>

        <!-- Google Sign-In -->
        <a href="http://localhost:5000/api/auth/google" class="btn-google" id="google-login-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </a>

        <div class="auth-divider"><span>or sign in with email</span></div>

        <!-- Login Form -->
        <form class="auth-form" id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <label class="form-label" for="password">Password</label>
              <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="input-icon-btn" data-toggle-password="password" aria-label="Toggle password visibility">
                <span class="eye-icon">👁️</span>
              </button>
            </div>
            <span class="form-error" id="password-error"></span>
          </div>

          <div>
            <label class="form-check">
              <input type="checkbox" id="remember-me">
              <span class="form-check-label">Keep me signed in for 7 days</span>
            </label>
          </div>

          <button type="submit" class="btn-primary" id="login-btn">
            Sign In
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one free</a>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    AuthManager.redirectIfAuthenticated('../index.html');

    // Init UI helpers
    initPasswordToggles();

    // Handle login form submission
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearFormErrors('login-form');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      // Basic client validation
      if (!email) return showFieldError('email', 'Email is required');
      if (!password) return showFieldError('password', 'Password is required');

      btn.classList.add('loading');
      btn.disabled = true;

      const { ok, data } = await AuthManager.login(email, password);

      btn.classList.remove('loading');
      btn.disabled = false;

      if (ok) {
        // Redirect to main site
        window.location.href = '../index.html';
      } else {
        const msg = data.errors ? data.errors.join(' ') : data.message;
        showAlert('login-alert', msg, 'error');
      }
    });

    // Handle Google OAuth token from redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get('google') === '1' && params.get('token')) {
      TokenStorage.setAccessToken(params.get('token'));
      showAlert('login-alert', 'Google login successful! Redirecting...', 'success');
      setTimeout(() => { window.location.href = '../index.html'; }, 1000);
    }
    if (params.get('error') === 'google_failed') {
      showAlert('login-alert', 'Google sign-in failed. Please try again.', 'error');
    }
  </script>
<script src="/search.js"></script>
</body>
</html>
