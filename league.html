<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitchLive — League Analytics</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth/auth.css">
  <link rel="stylesheet" href="/search.css">
  <link rel="stylesheet" href="mobile.css">
  <meta name="theme-color" content="#0f172a">

  <style>
    /* League Hero Banner */
    .league-hero {
      margin-top: 70px;
      position: relative;
      background-size: cover;
      background-position: center;
      min-height: 350px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .league-hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to right, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.8) 50%, rgba(15, 23, 42, 0.2) 100%);
    }
    .league-hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 0 40px;
      display: flex;
      align-items: center;
      gap: 40px;
    }
    .league-logo-wrap {
      width: 150px;
      height: 150px;
      background: #fff;
      border-radius: 50%;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .league-logo-wrap img {
      max-width: 100%;
      max-height: 100%;
    }
    .league-title {
      font-family: 'Poppins', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 5px;
    }
    .league-meta {
      font-size: 1.2rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* Filter Toolbar */
    .filter-bar {
      background: var(--secondary);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 70px;
      z-index: 50;
    }
    .filter-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px 40px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .filter-label {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .filter-select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 1em;
      padding-right: 40px;
    }
    .filter-select:hover, .filter-select:focus {
      border-color: var(--accent);
    }
    .filter-select option {
      background: var(--primary);
      color: var(--text);
    }

    /* League Navigation Tabs */
    .league-nav {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 40px;
      display: flex;
      gap: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      overflow-x: auto;
    }
    .league-tab {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 600;
      padding: 15px 0;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
      transition: color 0.3s;
    }
    .league-tab:hover { color: var(--text); }
    .league-tab.active { color: var(--accent); }
    .league-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
    }

    /* Content Area */
    .league-content {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 40px;
    }
    .tab-section { display: none; animation: fadeIn 0.4s ease forwards; }
    .tab-section.active { display: block; }

    /* Data Tables */
    .data-table-wrapper {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      overflow-x: auto;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
    }
    .data-table th {
      padding: 15px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .data-table td {
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      font-family: 'Inter', sans-serif;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    /* Standings Specific */
    .data-table .col-pos { width: 60px; font-weight: 700; color: var(--muted); }
    .data-table .col-team { text-align: left; font-weight: 600; display: flex; align-items: center; gap: 15px; }
    .data-table .col-pts { font-weight: 800; color: var(--text); font-size: 1.1rem; }
    .team-crest-small { width: 30px; height: 30px; object-fit: contain; }
    
    .pos-cl { border-left: 4px solid var(--accent); }
    .pos-rel { border-left: 4px solid #ef4444; }

    /* Form Guide */
    .form-badges { display: flex; gap: 4px; justify-content: center; }
    .form-badge {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; font-size: 0.7rem; font-weight: 700;
    }
    .form-w { background: #22c55e; color: #000; }
    .form-d { background: #64748b; color: #fff; }
    .form-l { background: #ef4444; color: #fff; }

    /* Leaderboard Lists (Top Scorers/Assists) */
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px 25px;
      transition: transform 0.2s;
    }
    .leaderboard-item:hover {
      transform: translateX(10px);
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(34, 197, 94, 0.3);
    }
    .lb-rank {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--muted);
      width: 60px;
    }
    .lb-photo {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--secondary);
      overflow: hidden;
      margin-right: 20px;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .lb-photo img { width: 100%; height: 100%; object-fit: cover; }
    .lb-info { flex: 1; }
    .lb-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; }
    .lb-team { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 0.9rem; }
    .lb-team img { width: 20px; height: 20px; object-fit: contain; }
    .lb-stat {
      font-family: 'Poppins', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      text-align: right;
    }
    .lb-stat-label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .league-hero-content { flex-direction: column; text-align: center; gap: 20px; padding: 40px; }
      .league-title { font-size: 2.5rem; }
      .filter-container { flex-direction: column; align-items: stretch; }
      .data-table .hide-mobile { display: none; }
      .lb-stat { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">⚽</span>
        Score<span class="logo-highlight">X</span>
      </a>
    </div>
  </nav>

  <!-- League Hero -->
  <header class="league-hero" id="league-hero" style="background-image: url('');">
    <div class="league-hero-overlay"></div>
    <div class="league-hero-content">
      <div class="league-logo-wrap" id="league-logo">
        <!-- Logo injected by JS -->
      </div>
      <div>
        <h1 class="league-title" id="league-name">Loading League...</h1>
        <div class="league-meta" id="league-country">--</div>
      </div>
    </div>
  </header>

  <!-- Filter Toolbar -->
  <div class="filter-bar">
    <div class="filter-container">
      <div class="filter-group">
        <span class="filter-label">Season</span>
        <select class="filter-select" id="season-filter">
          <option value="25/26">2025/2026</option>
          <option value="24/25">2024/2025</option>
          <option value="23/24">2023/2024</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Matchday</span>
        <select class="filter-select" id="matchday-filter">
          <option value="all">All Matchdays</option>
          <option value="38">Matchday 38</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Team</span>
        <select class="filter-select" id="team-filter">
          <option value="all">All Teams</option>
          <option value="arsenal">Arsenal</option>
          <option value="mancity">Man City</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Navigation Tabs -->
  <nav class="league-nav">
    <button class="league-tab active" data-tab="standings">Standings</button>
    <button class="league-tab" data-tab="fixtures">Fixtures</button>
    <button class="league-tab" data-tab="results">Results</button>
    <button class="league-tab" data-tab="stats">Top Scorers</button>
    <button class="league-tab" data-tab="assists">Top Assists</button>
  </nav>

  <!-- Content Containers -->
  <main class="league-content">
    
    <!-- Standings Tab -->
    <section id="tab-standings" class="tab-section active">
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th class="col-pos">#</th>
              <th class="col-team">Club</th>
              <th>MP</th>
              <th class="hide-mobile">W</th>
              <th class="hide-mobile">D</th>
              <th class="hide-mobile">L</th>
              <th class="hide-mobile">GF</th>
              <th class="hide-mobile">GA</th>
              <th>GD</th>
              <th class="col-pts">Pts</th>
              <th class="hide-mobile">Form</th>
            </tr>
          </thead>
          <tbody id="standings-body">
            <!-- Standings injected by JS -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Fixtures Tab -->
    <section id="tab-fixtures" class="tab-section">
      <div class="data-table-wrapper" style="padding: 40px; text-align: center; color: var(--muted);">
        Fixtures will be generated based on the selected Matchday filter.
      </div>
    </section>

    <!-- Results Tab -->
    <section id="tab-results" class="tab-section">
      <div class="data-table-wrapper" style="padding: 40px; text-align: center; color: var(--muted);">
        Results will be populated here.
      </div>
    </section>

    <!-- Top Scorers Tab -->
    <section id="tab-stats" class="tab-section">
      <div class="leaderboard-list" id="scorers-container">
        <!-- Scorers injected by JS -->
      </div>
    </section>

    <!-- Top Assists Tab -->
    <section id="tab-assists" class="tab-section">
      <div class="leaderboard-list" id="assists-container">
        <!-- Assists injected by JS -->
      </div>
    </section>

  </main>

  <script src="auth/auth.js"></script>
  <script src="league.js"></script>
  </footer>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-bottom-nav">
    <a href="index.html" class="mbn-item">
      <svg><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      Home
    </a>
    <a href="league.html" class="mbn-item active">
      <svg><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
      Leagues
    </a>
    <a href="predictions.html" class="mbn-item">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
      Predict
    </a>
    <a href="auth/profile.html" class="mbn-item">
      <svg><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      Profile
    </a>
  </nav>

  <script src="/search.js"></script>
  <script src="/favorites-ui.js"></script>
  <script src="mobile-gestures.js"></script>
</body>
</html>
