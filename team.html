<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitchLive — Team Profile</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth/auth.css">
  <link rel="stylesheet" href="/search.css">

  <style>
    /* Team Hero Banner */
    .team-hero {
      margin-top: 70px;
      position: relative;
      background-size: cover;
      background-position: center;
      min-height: 400px;
      display: flex;
      align-items: flex-end;
      padding-bottom: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .team-hero-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 0.6) 50%, rgba(15, 23, 42, 0.2) 100%);
    }
    .team-hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 0 40px;
      display: flex;
      align-items: flex-end;
      gap: 30px;
      transform: translateY(30px);
    }
    .team-logo-container {
      width: 160px;
      height: 160px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 2px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .team-logo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .team-info {
      padding-bottom: 40px;
    }
    .team-title {
      font-family: 'Poppins', sans-serif;
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .team-meta {
      display: flex;
      gap: 20px;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.8);
      font-weight: 500;
    }
    .team-meta span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Team Navigation Tabs */
    .team-nav {
      max-width: 1200px;
      margin: 60px auto 30px;
      padding: 0 40px;
      display: flex;
      gap: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      overflow-x: auto;
    }
    .team-tab {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 600;
      padding: 15px 0;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
      transition: color 0.3s;
    }
    .team-tab:hover {
      color: var(--text);
    }
    .team-tab.active {
      color: var(--accent);
    }
    .team-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
    }

    /* Content Area */
    .team-content-container {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 40px;
    }
    .tab-section {
      display: none;
      animation: fadeIn 0.4s ease forwards;
    }
    .tab-section.active {
      display: block;
    }

    /* Overview Styles */
    .overview-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }
    .info-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .info-item label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 5px;
    }
    .info-item span {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Squad Grid */
    .squad-group-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      margin: 40px 0 20px;
      color: var(--text);
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .squad-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }
    .player-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      cursor: pointer;
    }
    .player-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      border-color: rgba(34,197,94,0.3);
    }
    .player-img-wrap {
      height: 220px;
      background: linear-gradient(to top, rgba(15,23,42,1), rgba(15,23,42,0)), url('https://images.unsplash.com/photo-1574629810360-7efbb42f4c4a?q=80&w=600&auto=format&fit=crop') center/cover;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .player-img-wrap img {
      width: 90%;
      height: 90%;
      object-fit: cover;
      object-position: top;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
    }
    .player-rating-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 45px;
      height: 45px;
      background: var(--accent);
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      box-shadow: 0 4px 10px rgba(34,197,94,0.4);
    }
    .player-info {
      padding: 20px;
      text-align: center;
      position: relative;
    }
    .player-name {
      font-family: 'Poppins', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .player-pos {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }
    .player-meta {
      display: flex;
      justify-content: center;
      gap: 15px;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 15px;
    }

    /* Generic List (Fixtures/Results/Transfers) */
    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      background: rgba(255,255,255,0.01);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: background 0.2s;
    }
    .list-row:hover {
      background: rgba(255,255,255,0.03);
    }
    .list-date { color: var(--muted); width: 120px; }
    .list-main { flex: 1; font-weight: 600; font-size: 1.1rem; }
    .list-comp { color: var(--muted); width: 150px; text-align: right; font-size: 0.9rem; }
    .list-badge {
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 700;
      min-width: 80px;
      text-align: center;
    }
    .bg-green { background: rgba(34,197,94,0.15); color: #22c55e; }
    .bg-red { background: rgba(239,68,68,0.15); color: #ef4444; }
    .bg-gray { background: rgba(255,255,255,0.1); color: #fff; }

    @media (max-width: 768px) {
      .team-hero-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
        transform: translateY(60px);
      }
      .team-title { font-size: 2.5rem; }
      .team-meta { justify-content: center; flex-wrap: wrap; }
      .team-nav { margin-top: 90px; }
      .overview-grid { grid-template-columns: 1fr; }
      .list-row { flex-direction: column; gap: 10px; align-items: flex-start; }
      .list-comp { text-align: left; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-icon">⚽</span>
        Score<span class="logo-highlight">X</span>
      </a>
    </div>
  </nav>

  <!-- Team Hero -->
  <header class="team-hero" id="team-hero" style="background-image: url('');">
    <div class="team-hero-overlay"></div>
    <div class="team-hero-content">
      <div class="team-logo-container" id="team-logo">
        <!-- Logo injected by JS -->
      </div>
      <div class="team-info">
        <h1 class="team-title" id="team-name">Loading Team...</h1>
        <div class="team-meta" id="team-meta">
          <!-- Meta injected by JS -->
        </div>
      </div>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <nav class="team-nav">
    <button class="team-tab active" data-tab="overview">Overview</button>
    <button class="team-tab" data-tab="fixtures">Fixtures</button>
    <button class="team-tab" data-tab="results">Results</button>
    <button class="team-tab" data-tab="statistics">Statistics</button>
    <button class="team-tab" data-tab="squad">Players</button>
  </nav>

  <!-- Content Containers -->
  <main class="team-content-container">
    
    <!-- Overview Tab -->
    <section id="tab-overview" class="tab-section active">
      <div class="overview-grid">
        <div class="info-card">
          <h3 style="margin-bottom: 15px;">About the Club</h3>
          <p id="overview-text" style="color: var(--muted); line-height: 1.8;"></p>
        </div>
        <div class="info-card">
          <h3 style="margin-bottom: 15px;">Club Information</h3>
          <div class="info-grid" id="overview-info">
            <!-- Info injected by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- Fixtures Tab -->
    <section id="tab-fixtures" class="tab-section">
      <div class="info-card">
        <h3 style="margin-bottom: 20px;">Upcoming Matches</h3>
        <div id="fixtures-container">
          <!-- Fixtures injected by JS -->
        </div>
      </div>
    </section>

    <!-- Results Tab -->
    <section id="tab-results" class="tab-section">
      <div class="info-card">
        <h3 style="margin-bottom: 20px;">Recent Results</h3>
        <div id="results-container">
          <!-- Results injected by JS -->
        </div>
      </div>
    </section>

    <!-- Statistics Tab -->
    <section id="tab-statistics" class="tab-section">
      <div class="overview-grid">
        <div class="info-card">
          <h3 style="margin-bottom: 20px;">Season Performance</h3>
          <div class="info-grid" id="stats-container">
            <!-- Stats injected by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- Players (Squad) Tab -->
    <section id="tab-squad" class="tab-section">
      <div id="squad-container">
        <!-- Squad injected by JS -->
      </div>
    </section>

  </main>

  <script src="auth/auth.js"></script>
  <script src="team.js"></script>
<script src="/search.js"></script>
<script src="/favorites-ui.js"></script>
</body>
</html>
